<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문의 폼</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 22px;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    label .required {
      color: #e74c3c;
      margin-left: 2px;
    }

    input, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #333;
      transition: border-color 0.2s;
      outline: none;
      font-family: inherit;
    }

    input:focus, textarea:focus {
      border-color: #4f46e5;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .toast {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
    }

    .toast.success {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    .toast.error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>문의하기</h1>
    <p class="subtitle">아래 양식을 작성하여 문의를 남겨주세요.</p>

    <form id="contactForm">
      <div class="form-group">
        <label>이름 <span class="required">*</span></label>
        <input type="text" id="name" placeholder="홍길동" required />
      </div>

      <div class="form-group">
        <label>이메일 <span class="required">*</span></label>
        <input type="email" id="email" placeholder="example@email.com" required />
      </div>

      <div class="form-group">
        <label>전화번호</label>
        <input type="tel" id="phone" placeholder="010-0000-0000" />
      </div>

      <div class="form-group">
        <label>문의 내용 <span class="required">*</span></label>
        <textarea id="message" placeholder="문의 내용을 입력해주세요..." required></textarea>
      </div>

      <button type="submit" id="submitBtn">제출하기</button>
    </form>

    <div class="toast" id="toast"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://xtpqxrdnndsfkfikeghv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0cHF4cmRubmRzZmtmaWtlZ2h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODMzNzgsImV4cCI6MjA5MDE1OTM3OH0.NDAhCkodiEXT_WUhLRJK49I2fl7OUh2Gx3_1eixF-m8';

    const form = document.getElementById('contactForm');
    const submitBtn = document.getElementById('submitBtn');
    const toast = document.getElementById('toast');

    function showToast(message, type) {
      toast.textContent = message;
      toast.className = `toast ${type}`;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 4000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const message = document.getElementById('message').value.trim();

      submitBtn.disabled = true;
      submitBtn.textContent = '전송 중...';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/form`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ name, email, phone: phone || null, message })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.message || '서버 오류');
        }

        showToast('✓ 문의가 성공적으로 접수되었습니다!', 'success');
        form.reset();
      } catch (err) {
        showToast(`오류: ${err.message}`, 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '제출하기';
      }
    });
  </script>
</body>
</html>
