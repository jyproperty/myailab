<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My AI Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 480px;
      width: 90%;
    }
    .emoji { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
    .subtitle {
      color: #a0c4ff;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 0.4rem 1rem;
      margin: 0.3rem;
      font-size: 0.9rem;
    }
    .footer { margin-top: 2.5rem; color: #6c8ebf; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🤖</div>
    <h1>My AI Lab</h1>
    <p class="subtitle">AI와 함께하는 코딩 학습 공간</p>
    <div>
      <span class="badge">⚛️ React</span>
      <span class="badge">🎨 MUI</span>
      <span class="badge">✨ Vite</span>
      <span class="badge">🤖 Claude</span>
    </div>
    <p class="footer">Built with Claude Code · jyproperty</p>
  </div>
</body>
</html>
